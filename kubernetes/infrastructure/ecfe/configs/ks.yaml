---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app metallb-configs
  namespace: &namespace metallb
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/infrastructure/ecfe/configs/manifests
  targetNamespace: *namespace
  prune: true
  timeout: 5m0s
  dependsOn:
  - name: metallb
    namespace: metallb