---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app configs
  namespace: &namespace flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/infrastructure/configs/manifests
  prune: true
  timeout: 5m0s
  dependsOn:
  - name: external-secrets
    namespace: external-secrets
  - name: metallb
    namespace: metallb