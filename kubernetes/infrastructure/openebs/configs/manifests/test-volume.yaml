kind: PersistentVolume
apiVersion: v1
metadata:
  name: test-pv
spec:
  storageClassName: localpv-raid
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-pvc
  namespace: openebs
spec:
  volumeName: test-pv

---

apiVersion: v1
kind: Pod
metadata:
  name: pvc-test
  namespace: openebs
spec:
  restartPolicy: Never

  containers:
    - name: tester
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "PVC test successful" > /data/hello.txt
          sleep 3600

      volumeMounts:
        - name: test-storage
          mountPath: /data

  volumes:
    - name: test-storage
      persistentVolumeClaim:
        claimName: test-pvc