apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
  namespace: openebs
spec:
  interval: 30m

  chart:
    spec:
      chart: openebs
      sourceRef:
        kind: HelmRepository
        name: openebs
        namespace: openebs

  upgrade:
    remediation:
      retries: 5

  values:
    # --------------------------------------------------
    # OpenEBS v4.4 — LOCALPV ONLY (Talos Homelab)
    # --------------------------------------------------

    # Disable replicated storage platform (Mayastor)
    engines:
      replicated:
        mayastor:
          enabled: false

      # Disable other local engines we don't want
      local:
        lvm:
          enabled: false
        zfs:
          enabled: false

    # Enable ONLY hostpath LocalPV
    localpv-provisioner:
      enabled: true
      localpv:
        basePath: /var/mnt/raid-data/pvcs

    # Node Disk Manager (safe + recommended)
    ndm:
      enabled: true

    ndmOperator:
      enabled: true

    # ---- Disable platform services pulled by Mayastor ----
    loki:
      enabled: false

    minio:
      enabled: false

    nats:
      enabled: false

    alloy:
      enabled: false

    apiServer:
      enabled: false

    etcd:
      enabled: false

    obs:
      enabled: false

    # Optional — Talos already has snapshots CRDs usually
    openebs-crds:
      csi:
        volumeSnapshots:
          enabled: false