---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app traefik-configs
  namespace: &namespace ingress
  labels:
    selfhost.security: sops
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/infrastructure/ingress-controller/configs/manifests
  targetNamespace: *namespace
  prune: true
  timeout: 5m0s
  dependsOn:
  - name: external-secrets-configs
    namespace: external-secrets
  - name: traefik
    namespace: *namespace