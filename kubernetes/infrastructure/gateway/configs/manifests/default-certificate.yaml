apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-apps
  namespace: ingress
spec:
  secretName: wildcard-apps-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
  - "*.fonzdm.xyz"
  - "*.infra.fonzdm.xyz"
  - "*.service.fonzdm.xyz"
  - "*.media.fonzdm.xyz"
  - "*.cloud.fonzdm.xyz"