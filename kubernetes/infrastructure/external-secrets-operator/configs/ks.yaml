---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app external-secrets-configs
  namespace: &namespace external-secrets
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./kubernetes/infrastructure/external-secrets-operator/configs/manifests
  targetNamespace: *namespace
  prune: true
  timeout: 5m0s
  dependsOn:
  - name: external-secrets
    namespace: *namespace