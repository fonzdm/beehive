apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: "sops-age"
spec:
  # The name to be used on the ExternalSecrets
  externalSecretName: "sops-age-es"
  namespaceSelectors:
  - matchLabels:
      selfhost.security: sops
  refreshTime: "30m" #Cluster External Secret refresh Time
  externalSecretSpec:
    secretStoreRef:
      name: sops-store
      kind: ClusterSecretStore
    refreshInterval: "3m" #External Secret Refresh Time
    target:
      name: sops-age
      creationPolicy: 'Owner'
    dataFrom:
      - extract: 
          key: sops-age