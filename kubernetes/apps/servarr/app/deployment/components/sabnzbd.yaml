apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sabnzbd
  namespace: servarr
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: servarr

  values:
    controllers:
      sabnzbd:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 65533
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 65533
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/sabnzbd
              tag: latest
            env:
              TZ: Europe/Rome
              PUID: 1000
              PGID: 65533
              SABNZBD__HOST_WHITELIST: sabnzbd.media.fonzdm.xyz

    service:
      main:
        ports:
          http:
            port: 8080

    persistence:
      media:
        existingClaim: talos-media-volume
      config:
        enabled: true
        size: 8Gi
        storageClass: localpv-raid
        accessMode: ReadWriteOnce
        type: persistentVolumeClaim
      tmpfs:
        type: emptyDir
        globalMounts:
        - path: /tmp
          subPath: tmp
              
    route:
      app:
        enabled: true
        kind: HTTPRoute
        parentRefs:
        - name: traefik-gateway
          namespace: ingress
          sectionName: websecure
        hostnames:
        - "sabnzbd.media.fonzdm.xyz"

        rules:
        - matches:
          - path:
              type: PathPrefix
              value: /
          filters:
          - type: RequestHeaderModifier
            requestHeaderModifier:
              set:
              - name: X-Forwarded-Proto
                value: https
          backendRefs:
          - name: sabnzbd
            port: 8080
