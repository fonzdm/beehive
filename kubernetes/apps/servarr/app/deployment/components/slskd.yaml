apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: slskd
    namespace: servarr
spec:
    interval: 1h0m0s
    chart:
        spec:
            chart: app-template
            sourceRef:
                kind: HelmRepository
                name: bjw-s
                namespace: servarr
    values:
        controllers:
            lidarr:
                annotations:
                    reloader.stakater.com/auto: "true"
                pod:
                    securityContext:
                        fsGroup: 65533
                        fsGroupChangePolicy: OnRootMismatch
                        runAsGroup: 65533
                        runAsNonRoot: true
                        runAsUser: 65534
                containers:
                    app:
                        image:
                            repository: slskd/slskd
                            tag: latest
                        env:
                            SLSKD_USERNAME: fonzdm
                            SLSKD_PASSWORD: ENC[AES256_GCM,data:QPpoGtJ0QQU=,iv:1anxVs18SuUpqMywamN4ovV02qhubUJTB7UmsKUcqfc=,tag:YOtnSpzNOpjrnkp7aSKaSg==,type:str]
                            SLSKD_SHARED_DIR: /var/tmp/shared
                            SLSKD_DOWNLOADS_DIR: /mnt/media/Downloads
                            SLSKD_INCOMPLETE_DIR: /mnt/media/Downloads
                            SLSKD_REMOTE_CONFIGURATION: true
                            SLSKD_SLSK_LISTEN_PORT: 59303
                            SLSKD_SLSK_USERNAME: fonzdm
                            SLSKD_SLSK_PASSWORD: ENC[AES256_GCM,data:Yd1oelcACJc=,iv:EbhE6kufxO3xnTrrHTv0QmjEnoxGWHS9VfM4q9irEtc=,tag:MQW+3xMTFdsS1p2BMUffVQ==,type:str]
                            SLSKD_CONTROLLER_API_KEY: ENC[AES256_GCM,data:38f7FJxK5uikzG3x5gNmB1pUEDzZUxs685ky94fPEOCyKkQ2aUE=,iv:ykjBbWFcxIvAAgujCnpooWp6ZJHvkXLn7Hy8TLZsi8w=,tag:2h1e+CUwvcm7f3ZSM8hAbA==,type:str]
                        probes:
                            liveness:
                                enabled: true
                                spec:
                                    periodSeconds: 30
                                    timeoutSeconds: 5
                                    failureThreshold: 5
                            readiness:
                                enabled: true
                                custom: true
                                spec:
                                    httpGet:
                                        path: /ping
                                        port: 59303
                                    periodSeconds: 10
                                    timeoutSeconds: 5
                                    failureThreshold: 5
                            startup:
                                enabled: true
                                spec:
                                    failureThreshold: 30
                                    periodSeconds: 10
                        resources:
                            requests:
                                cpu: 20m
                                memory: 384Mi
                            limits:
                                memory: 2Gi
                        securityContext:
                            allowPrivilegeEscalation: false
                            readOnlyRootFilesystem: true
                            capabilities:
                                drop:
                                    - ALL
        service:
            app:
                ports:
                    http:
                        port: 59303
        persistence:
            media:
                existingClaim: talos-media-volume
            config:
                enabled: true
                size: 8Gi
                storageClass: localpv-raid
            tmpfs:
                type: emptyDir
                globalMounts:
                    - path: /tmp
                      subPath: tmp
