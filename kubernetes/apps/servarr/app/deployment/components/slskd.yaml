apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: slskd
    namespace: servarr
spec:
    interval: 1h0m0s
    chart:
        spec:
            chart: app-template
            sourceRef:
                kind: HelmRepository
                name: bjw-s
                namespace: servarr
    values:
        controllers:
            slskd:
                annotations:
                    reloader.stakater.com/auto: "true"
                pod:
                    securityContext:
                        fsGroup: 65533
                        fsGroupChangePolicy: OnRootMismatch
                        runAsGroup: 0
                        runAsNonRoot: false
                        runAsUser: 0
                containers:
                    app:
                        image:
                            repository: slskd/slskd
                            tag: latest
                        env:
                            SLSKD_USERNAME: fonzdm
                            SLSKD_PASSWORD: ENC[AES256_GCM,data:vUOKXbc8NLw3,iv:CBbwvTa6OZC/WZIdXJBGJcevBttCFJXehj7AQ/JYaPc=,tag:QWsqkGc3TayJmAAM8dDCIQ==,type:str]
                            SLSKD_SHARED_DIR: /var/tmp/shared
                            SLSKD_DOWNLOADS_DIR: /media/Downloads
                            SLSKD_INCOMPLETE_DIR: /media/Downloads
                            SLSKD_REMOTE_CONFIGURATION: true
                            SLSKD_SLSK_LISTEN_PORT: 59303
                            SLSKD_SLSK_USERNAME: fonzdm
                            SLSKD_SLSK_PASSWORD: ENC[AES256_GCM,data:kdnZokcRjqqn,iv:7ZlmL9RpkeqOnxAWppNlLEAD4bZWckp6w0oMBoOQWlU=,tag:w5k/6E9Qj8FDE5hnm7U/eg==,type:str]
                            SLSKD_CONTROLLER_API_KEY: ENC[AES256_GCM,data:uon0qG/pHxTvkMW7/6/kDzyowIMxOPMIktXQdn1bo/e5WDsdsJblxm9NNg==,iv:EXf8pc3Jf8W3GHGSqvsUDjRFtqnW7ESMhfF0a+ENODk=,tag:Cxc0FT+0OPHMiTRktJc4Ew==,type:str]
                        probes:
                            liveness:
                                enabled: true
                                spec:
                                    periodSeconds: 30
                                    timeoutSeconds: 5
                                    failureThreshold: 5
                            readiness:
                                enabled: true
                                custom: true
                                spec:
                                    httpGet:
                                        path: /ping
                                        port: 59303
                                    periodSeconds: 10
                                    timeoutSeconds: 5
                                    failureThreshold: 5
                            startup:
                                enabled: true
                                spec:
                                    failureThreshold: 30
                                    periodSeconds: 10
                        resources:
                            requests:
                                cpu: 20m
                                memory: 384Mi
                            limits:
                                memory: 2Gi
                        securityContext:
                            allowPrivilegeEscalation: false
                            readOnlyRootFilesystem: true
                            capabilities:
                                drop:
                                    - ALL
        service:
            app:
                ports:
                    http:
                        port: 59303
        persistence:
            media:
                existingClaim: talos-media-volume
            config:
                enabled: true
                size: 4Gi
                storageClass: localpv-raid
                accessMode: ReadWriteOnce
                type: persistentVolumeClaim
