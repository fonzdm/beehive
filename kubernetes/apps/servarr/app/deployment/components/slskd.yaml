apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: slskd
    namespace: servarr
spec:
    interval: 30m
    chart:
        spec:
            chart: app-template
            sourceRef:
                kind: HelmRepository
                name: bjw-s
                namespace: servarr
    upgrade:
        cleanupOnFail: true
    values:
        controllers:
            slskd:
                type: deployment
                pod:
                    securityContext:
                        runAsUser: 1000
                        runAsGroup: 65533
                        fsGroup: 65533
                        fsGroupChangePolicy: OnRootMismatch
                containers:
                    app:
                        image:
                            repository: slskd/slskd
                            tag: latest
                            pullPolicy: IfNotPresent
                        env:
                            TZ: Europe/Rome
                            UMASK: "002"
                            SLSKD_REMOTE_CONFIGURATION: true
                            SLSKD_DOWNLOADS_DIR: /media/Downloads
                            SLSKD_INCOMPLETE_DIR: /media/IncompleteDownloads
                            SLSKD_SHARED_DIR: /media/Music
                            SLSKD_USERNAME: fonzdm
                            SLSKD_PASSWORD: ENC[AES256_GCM,data:osBoNFQ1nh0=,iv:SZvvvqi1mB/ZVUVMHpaZUCwIeA9YQ+l0ALXs8xRQ/qA=,tag:l72Q/qinFNsGIkTJQo0lvw==,type:str]
                            SLSKD_SLSK_USERNAME: fonzdm-slsk-user
                            SLSKD_SLSK_PASSWORD: ENC[AES256_GCM,data:ChyBW78zd+vk5Yv+R6BOsA==,iv:GL6okBjcm1xgHhJ9RdPzadvGSBp1V2u/JxNLx84FMBA=,tag:GpNrTRMNLZbgGuawzCC+Lg==,type:str]
                            SLSKD_API_KEY: ENC[AES256_GCM,data:spUkPK5MT1RcQPJEfJ9XtGfn/jrMo4r+0L6MN9uWQRvr/Gs37HmdKns/hrIByzebB9Ah3ohXMLJs,iv:B6WfhELoeyJRpz2LQfUdpwSRzjftdf40b6ZOfbKqzjo=,tag:NfAFCF5mDmDFRncTfmcaFg==,type:str]
                        ports:
                            - name: http
                              containerPort: 5030
                            - name: soulseek
                              containerPort: 50300
                        probes:
                            liveness:
                                enabled: true
                                spec:
                                    periodSeconds: 30
                                    timeoutSeconds: 5
                                    failureThreshold: 5
                            readiness:
                                enabled: true
                            startup:
                                enabled: true
                                spec:
                                    failureThreshold: 30
                                    periodSeconds: 10
        service:
            app:
                controller: slskd
                ports:
                    http:
                        port: 5030
                    soulseek:
                        port: 50300
        ingress:
            main:
                enabled: false
                # enable later if you expose through traefik/nginx
        persistence:
            config:
                enabled: true
                type: persistentVolumeClaim
                accessMode: ReadWriteOnce
                size: 2Gi
                globalMounts:
                    - path: /app
            media:
                enabled: true
                existingClaim: talos-media-volume
                globalMounts:
                    - path: /media
        resources:
            requests:
                cpu: 50m
                memory: 256Mi
            limits:
                memory: 1Gi
