apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: servarr
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: jellyfin
      sourceRef:
        kind: HelmRepository
        name: jellyfin-charts
  values:
    replicaCount: 0
    image:
      pullPolicy: IfNotPresent
    persistence:
      config:
        enabled: true
        size: 8Gi
        storageClass: 'localpv-raid'
      media:
        enabled: true
        existingClaim: talos-media-volume
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
