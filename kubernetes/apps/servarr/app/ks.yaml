---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  labels:
    selfhost.security: sops
  name: &app servarr
  namespace: &namespace servarr
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 30m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: sonarr
      namespace: *namespace
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: jellyfin
      namespace: *namespace
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: lidarr
      namespace: *namespace
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: slskd
      namespace: *namespace
  path: ./kubernetes/apps/servarr/app/deployment
  prune: false
  timeout: 30m0s