---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app postgres-operator
  namespace: &namespace postgres-operator
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace
  path: ./kubernetes/apps/psql-operator/app/deployment
  targetNamespace: *namespace
  prune: true
  timeout: 5m0s