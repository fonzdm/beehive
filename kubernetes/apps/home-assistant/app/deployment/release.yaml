# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: home-assistant
  interval: 30m
  timeout: 15m
  values:
    controllers:
      home-assistant:
        pod:
          nodeSelector:
            topology.kubernetes.io/zone: minipc-0
          tolerations:
          - key: "storage"
            operator: "Equal"
            value: "no-nas"
            effect: "NoSchedule"
          securityContext:
            fsGroup: 65533
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 65533
            runAsUser: 65534
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant # {"$imagepolicy": "flux-system:homeassistant-imagepolicy:name"}
              tag: rolling # {"$imagepolicy": "flux-system:homeassistant-imagepolicy:tag"}
              digest: sha256:589e4c1c93025d01320c14329427197c8b52d4f2e241a6bc1d6207837e07b4a7 # {"$imagepolicy": "flux-system:homeassistant-imagepolicy:digest"}
            env:
              TZ: Europe/Rome
              HASS_HTTP_TRUSTED_PROXY_1: 192.168.1.0/24
              HASS_HTTP_TRUSTED_PROXY_2: 10.244.0.0/16
            resources:
              requests:
                cpu: 300m
              limits:
                memory: 2Gi
            lifecycle:
              postStart:
                exec:
                  command: ["bash", "-c", "sleep 30 ; cd /config && wget -O - https://get.hacs.xyz | bash -"]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                - ALL
    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/wss
            port: 8123
        primary: true
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
        - path: /config
      config-cache:
        existingClaim: "{{ .Release.Name }}-cache"
        globalMounts:
        - path: /config/.venv
      tmp:
        type: emptyDir
    ingress:
      home-assistant:
        enabled: false
    route:
      app:
        enabled: true
        kind: HTTPRoute
        parentRefs:
        - name: traefik-gateway
          namespace: ingress
          sectionName: websecure
        hostnames:
        - "ha.cloud.fonzdm.xyz"
        rules:
        - matches:
          - path:
              type: PathPrefix
              value: /
          backendRefs:
          - name: home-assistant
            port: 8123
